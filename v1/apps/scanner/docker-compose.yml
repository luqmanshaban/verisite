services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  scanner:
    build: ./apps/scanner
    ports:
      - "8080:8080"
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY}
      - CALLBACK_URL=http://host.docker.internal:3000
    depends_on:
      - mongodb

volumes:
  mongo_data: